name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore OpenPuckWeblessSettings.slnx
      - run: dotnet build OpenPuckWeblessSettings.slnx -c Release --no-restore
      - run: dotnet test OpenPuckWeblessSettings.slnx -c Release --no-build
